<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chanzél Hammond — CV</title>
<style>
  :root {
    --navy: #1F2A44;
    --accent: #2C6E49;
    --grey: #5B6470;
    --bg: #F7F8FA;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Calibri, Roboto, sans-serif;
    color: var(--navy);
    padding: 24px;
  }
  .card {
    background: #ffffff;
    border-radius: 14px;
    padding: 48px 44px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 1px 3px rgba(31,42,68,0.08), 0 8px 24px rgba(31,42,68,0.06);
    border: 1px solid rgba(31,42,68,0.06);
  }
  h1 {
    font-size: 26px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  p.role {
    margin: 0 0 28px;
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
  }
  a.download {
    display: inline-block;
    background: var(--navy);
    color: #fff;
    text-decoration: none;
    padding: 13px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.15s ease;
  }
  a.download:hover {
    background: var(--accent);
  }
  .meta {
    margin-top: 28px;
    font-size: 13px;
    color: var(--grey);
    line-height: 1.6;
  }
  .meta a {
    color: var(--grey);
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Chanzél Hammond</h1>
    <p class="role">Computer Science Student · Software Developer</p>
    <a class="download" href="Chanzel_Hammond_CV_.pdf" download>Download CV (PDF)</a>
    <div class="meta">
      chanzelhammond@gmail.com &nbsp;·&nbsp;
      <a href="https://www.linkedin.com/in/chanz%C3%A9l-hammond-35057a28b" target="_blank">LinkedIn</a> &nbsp;·&nbsp;
      <a href="https://github.com/chanzelh" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
